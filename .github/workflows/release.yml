name: Erzmark Launcher – Release bauen

# Manuell auslösbar über den "Actions"-Tab auf GitHub (Run workflow-Button).
# Baut Windows-, macOS- (Intel + Apple Silicon) und Linux-Installer parallel
# in der Cloud – kein eigener Mac/Linux-Rechner nötig. Legt am Ende einen
# GitHub-Release als Entwurf (Draft) an, den du nach Prüfung manuell
# veröffentlichst.
on:
  workflow_dispatch: {}

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon (M1 und neuer)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # Intel-Macs
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Linux-Systemabhängigkeiten installieren
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev pkg-config

      - name: Frontend-Abhängigkeiten installieren
        run: npm install

      - name: Erzmark Launcher bauen + als Release-Entwurf hochladen
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: erzmark-launcher-v__VERSION__
          releaseName: 'Erzmark Launcher v__VERSION__'
          releaseBody: 'Neue Version des Erzmark Launchers.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
